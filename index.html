<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOX1</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: radial-gradient(circle at top, #0a0f2c, #020617);
    color: #e2e8f0;
    overflow-x: hidden;
}

/* FUNDO */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        90deg,
        rgba(59,130,246,0.05) 0px,
        rgba(59,130,246,0.05) 1px,
        transparent 1px,
        transparent 80px
    );
    animation: moveLines 10s linear infinite;
    z-index: -1;
}

@keyframes moveLines {
    from {transform: translateX(0);}
    to {transform: translateX(80px);}
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
    background: rgba(2,6,23,0.6);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(59,130,246,0.2);
}

header h1 {
    color: #3b82f6;
    text-shadow: 0 0 10px #3b82f6;
}

nav a {
    margin-left: 25px;
    text-decoration: none;
    color: #94a3b8;
    transition: 0.3s;
}

nav a:hover {
    color: #3b82f6;
    text-shadow: 0 0 8px #3b82f6;
}

/* HERO */
.hero {
    height: 90vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

/* CAIXA DE MENSAGEM */
.box {
    width: 100%;
    max-width: 350px;
    padding: 25px;
    border-radius: 15px;
    background: rgba(2,6,23,0.7);
    border: 1px solid rgba(59,130,246,0.2);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 20px rgba(0,0,0,0.6);
    text-align: center;
}

.box h2 {
    color: #60a5fa;
    margin-bottom: 15px;
}

.box input,
.box textarea {
    width: 100%;
    margin-bottom: 12px;
    padding: 10px;
    border-radius: 6px;
    border: none;
    outline: none;
}

.box textarea {
    height: 80px;
    resize: none;
}

.box button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(90deg, #3b82f6, #06b6d4);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.box button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(59,130,246,0.8);
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    color: #64748b;
    border-top: 1px solid rgba(59,130,246,0.2);
}
</style>
</head>

<body>

<header>
    <h1>BOX1</h1>
    <nav>
        <a href="index.html">Início</a>
        <a href="Jogos.html">Jogos</a>
        <a href="Programas.html">Programas</a>
    </nav>
</header>

<section class="hero">
    <div class="box">
        <h2>Deixe seu Pedido</h2>

        <input type="text" id="nome" placeholder="Seu nome">
        <textarea id="mensagem" placeholder="Escreva sua mensagem..."></textarea>

        <button onclick="enviar()">Enviar pelo WhatsApp</button>
    </div>
</section>

<footer>
    <p>© 2026 • Box1</p>
</footer>

<script>
function enviar() {
    let nome = document.getElementById("nome").value;
    let msg = document.getElementById("mensagem").value;

    let numero = "5579999555352";

    let texto = `Olá, meu nome é ${nome}. ${msg}`;

    let url = `https://wa.me/${numero}?text=${encodeURIComponent(texto)}`;

    window.open(url, "_blank");
}
</script>

</body>
</html>
