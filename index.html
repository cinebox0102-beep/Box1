<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: radial-gradient(circle at top, #0a0f2c, #020617);
    color: #e2e8f0;
    overflow-x: hidden;
}

/* FUNDO */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        90deg,
        rgba(59,130,246,0.05) 0px,
        rgba(59,130,246,0.05) 1px,
        transparent 1px,
        transparent 80px
    );
    animation: moveLines 10s linear infinite;
    z-index: -1;
}

@keyframes moveLines {
    from {transform: translateX(0);}
    to {transform: translateX(80px);}
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
    background: rgba(2,6,23,0.6);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(59,130,246,0.2);
}

header h1 {
    color: #3b82f6;
    text-shadow: 0 0 10px #3b82f6;
}

nav a {
    margin-left: 25px;
    text-decoration: none;
    color: #94a3b8;
    transition: 0.3s;
}

nav a:hover {
    color: #3b82f6;
    text-shadow: 0 0 8px #3b82f6;
}

/* HERO */
.hero {
    height: 90vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

/* CAIXA DE MENSAGEM */
.box {
    width: 100%;
    max-width: 350px;
    padding: 25px;
    border-radius: 15px;
    background: rgba(2,6,23,0.7);
    border: 1px solid rgba(59,130,246,0.2);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 20px rgba(0,0,0,0.6);
    text-align: center;
}

.box h2 {
    color: #60a5fa;
    margin-bottom: 15px;
}

.box input,
.box textarea {
    width: 100%;
    margin-bottom: 12px;
    padding: 10px;
    border-radius: 6px;
    border: none;
    outline: none;
}

.box textarea {
    height: 80px;
    resize: none;
}

.box button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(90deg, #3b82f6, #06b6d4);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.box button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(59,130,246,0.8);
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    color: #64748b;
    border-top: 1px solid rgba(59,130,246,0.2);
}

/* CARDS PRINCIPAIS */
.cards {
    padding: 60px 40px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
}

.card {
    padding: 25px;
    border-radius: 15px;
    background: rgba(2,6,23,0.6);
    border: 1px solid rgba(59,130,246,0.2);
    backdrop-filter: blur(15px);
    transition: 0.4s;
    position: relative;
    overflow: hidden;
}

.card::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: linear-gradient(120deg, transparent, rgba(59,130,246,0.3), transparent);
    transform: rotate(25deg);
    top: -100%;
    left: -100%;
    transition: 0.5s;
}

.card:hover::before {
    top: 100%;
    left: 100%;
}

.card:hover {
    transform: translateY(-10px) scale(1.02);
    border-color: #3b82f6;
}

.card h3 {
    color: #3b82f6;
}

/* CARROSSEL (ISOLADO SEM QUEBRAR O RESTO) */
.carrossel {
    display: flex;
    overflow-x: auto;
    gap: 20px;
    padding: 20px;
    scroll-behavior: smooth;
}

.carrossel::-webkit-scrollbar {
    display: none;
}

.carrossel .card {
    min-width: 200px;
    height: 300px;
    background: #1e293b;
    border-radius: 10px;
    padding: 15px;
    color: #fff;

    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    text-align: center;
}

.carrossel .card h3 {
    font-size: 16px;
    margin: 0;
}

.carrossel .card img {
    width: 130px;
    height: 200px;
    object-fit: cover;
    border-radius: 10px;
}

.carrossel .btn {
    padding: 8px 15px;
    background: #2563eb;
    border: none;
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
    width: 60%;
}
